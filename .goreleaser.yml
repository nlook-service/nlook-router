project_name: nlook-router

builds:
  - main: ./cmd/nlook-router
    binary: nlook-router
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: binary
    format: binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
  - id: bundle
    format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}-bundle"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - tools-bridge/tool_bridge/**/*
      - tools-bridge/requirements.txt
      - tools-bridge/pyproject.toml
      - tools-bridge/README.md

checksum:
  name_template: checksums.txt

release:
  github:
    owner: nlook-service
    name: nlook-router
